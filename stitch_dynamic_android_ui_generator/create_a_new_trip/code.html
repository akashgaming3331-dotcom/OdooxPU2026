<main class="pt-20 px-container-padding max-w-2xl mx-auto">

<section class="mb-section-margin">
<h1 class="font-display-lg text-display-lg mb-2">Create a New Trip</h1>
<p class="font-body-md text-body-md text-on-surface-variant">Start your next adventure by filling in the details below.</p>
</section>
<!-- Planning Form Container -->
<div class="bg-surface-container-lowest rounded-xl p-6 shadow-sm border border-surface-container-high space-y-6 mb-section-margin">
<!-- Destination Search -->
<div class="space-y-2">
<label class="font-label-md text-label-md text-primary">DESTINATION</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline" data-icon="location_on">location_on</span>
<input class="w-full pl-10 pr-4 py-3 rounded-lg border-none bg-surface-container text-body-lg focus:ring-2 focus:ring-secondary transition-all" placeholder="Where do you want to go?" type="text"/>
</div>
</div>
<!-- Date Range Pickers -->
<div class="grid grid-cols-2 gap-4">
<div class="space-y-2">
<label class="font-label-md text-label-md text-primary">START DATE</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline" data-icon="calendar_today">calendar_today</span>
<input class="w-full pl-10 pr-4 py-3 rounded-lg border-none bg-surface-container text-body-md focus:ring-2 focus:ring-secondary" type="date"/>
</div>
</div>
<div class="space-y-2">
<label class="font-label-md text-label-md text-primary">END DATE</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline" data-icon="calendar_month">calendar_month</span>
<input class="w-full pl-10 pr-4 py-3 rounded-lg border-none bg-surface-container text-body-md focus:ring-2 focus:ring-secondary" type="date"/>
</div>
</div>
</div>
<!-- Budget Selectors -->
<div class="space-y-3">
<label class="font-label-md text-label-md text-primary">BUDGET LEVEL</label>
<div class="grid grid-cols-3 gap-3">
<button class="flex flex-col items-center p-3 rounded-xl border-2 border-surface-container-high hover:border-secondary-container hover:bg-secondary-container transition-all group">
<span class="material-symbols-outlined text-outline group-hover:text-on-secondary-container" data-icon="savings">savings</span>
<span class="font-label-md text-label-md mt-1">Economic</span>
</button>
<button class="flex flex-col items-center p-3 rounded-xl border-2 border-secondary bg-secondary-container text-on-secondary-container shadow-sm">
<span class="material-symbols-outlined" data-icon="payments" style="font-variation-settings: 'FILL' 1;">payments</span>
<span class="font-label-md text-label-md mt-1">Moderate</span>
</button>
<button class="flex flex-col items-center p-3 rounded-xl border-2 border-surface-container-high hover:border-secondary-container hover:bg-secondary-container transition-all group">
<span class="material-symbols-outlined text-outline group-hover:text-on-secondary-container" data-icon="diamond">diamond</span>
<span class="font-label-md text-label-md mt-1">Luxury</span>
</button>
</div>
</div>

<button class="w-full bg-[#FF7043] hover:bg-[#F4511E] text-white py-4 rounded-full font-headline-sm text-headline-sm shadow-md transition-transform active:scale-95">
                Create Itinerary
            </button>

<div class="absolute inset-0 bg-gradient-to-t from-black/60 to-transparent flex flex-col justify-end p-4">

<h3 class="text-white font-headline-sm text-headline-sm">Paris: City of Lights</h3>
<p class="text-white/80 font-body-md text-body-md">Romantic walks &amp; historic cafes</p>

</div>

<div class="absolute inset-0 bg-gradient-to-t from-black/60 to-transparent flex flex-col justify-end p-3">

<span class="material-symbols-outlined" data-icon="person">person</span>
