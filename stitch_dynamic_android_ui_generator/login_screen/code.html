<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Traveloop - Login</title>
<!-- Tailwind CSS -->

                "outline": "#75777e",

                "on-error": "#ffffff",
                "on-tertiary-container": "#d76135",
                "on-secondary": "#ffffff",
                "on-tertiary": "#ffffff",
                "primary": "#00030a",

                "surface-tint": "#4e5f7c",

                "primary-fixed": "#d6e3ff",
                "surface-dim": "#d8dadc",
                "tertiary-fixed": "#ffdbcf",

            "spacing": {
                "card-gap": "16px",
                "container-padding": "20px",
                "unit": "8px",
                "touch-target": "48px",
                "section-margin": "32px"
            },
            "fontFamily": {
                "body-lg": ["Plus Jakarta Sans"],
                "label-md": ["Plus Jakarta Sans"],
                "body-md": ["Plus Jakarta Sans"],
                "headline-sm": ["Plus Jakarta Sans"],

                "headline-sm": ["20px", {"lineHeight": "28px", "fontWeight": "600"}],

                "display-lg": ["32px", {"lineHeight": "40px", "letterSpacing": "-0.02em", "fontWeight": "700"}]

          },
        },
      }

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            vertical-align: middle;
        }
        .hero-gradient {
            background: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.6));
        }
        .adventure-image {
            object-fit: cover;
            width: 100%;
            height: 100%;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background font-body-lg antialiased">
<!-- Top Navigation (Shell) - Suppressed per rules for Transactional screen, but keeping Brand Anchor TopAppBar logic if contextually required. For login, we typically hide global nav. -->
<main class="min-h-screen flex flex-col md:flex-row">
<!-- Visual Hero Section -->
<section class="relative w-full md:w-1/2 lg:w-3/5 h-[353px] md:h-screen overflow-hidden">
<img alt="Adventure Traveler" class="adventure-image" data-alt="A breathtaking view of a young traveler standing on a rugged mountain peak overlooking a vast, misty valley at dawn. The lighting is ethereal and soft, dominated by cool blue tones and warm golden sunlight breaking through the horizon. The composition captures the 'Adventure Awaits' spirit with high-key cinematic lighting and a sense of endless possibility. The visual style is premium and inspiring, echoing the reliable and organized brand identity of Traveloop." src="https://lh3.googleusercontent.com/aida-public/AB6AXuB4WCxbafeCQWePiJ0qEqRp1Dw_0U_8rNk714YOpu4RK4QDtIQ2E6Kd3CXaOs3gPpgnb1m4_eRoNc0Xz_wsco_XUsswGX9_u6owrf6GVm1WecmAyhGv146VWNw0TnWtymPcPLsFS-Yvc8qe6lUpEfBNkhJs_OEFuqTH506z0jEDSvR7VVW_KYYAvAmwUjIlx4Sx__WCvD7sQ798DQgZNL0usgFXEbdOlOALGmTabk3qHS4SOYFEaJWmEVROw3nHI-vltmiSfcohYQ"/>
<div class="absolute inset-0 hero-gradient flex flex-col justify-end p-container-padding pb-section-margin md:p-16">
<div class="space-y-2">
<h1 class="text-white font-display-lg text-display-lg-mobile md:text-display-lg">Adventure Awaits.</h1>
<p class="text-white/80 font-body-lg max-w-md">Join thousands of travelers planning their next unforgettable journey with Traveloop.</p>
</div>
</div>
<!-- Logo Floating -->
<div class="absolute top-container-padding left-container-padding md:top-12 md:left-12">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-white text-4xl" data-icon="explore">explore</span>
<span class="text-white font-headline-md font-bold tracking-tight">Traveloop</span>
</div>
</div>
</section>
<!-- Login Form Section -->
<section class="w-full md:w-1/2 lg:w-2/5 flex items-center justify-center p-container-padding md:p-12 lg:p-24 bg-surface">
<div class="w-full max-w-sm space-y-8">
<header class="space-y-2">
<h2 class="text-primary font-headline-md text-headline-md">Welcome Back</h2>
<p class="text-on-surface-variant font-body-md">Please enter your details to sign in to your travel dashboard.</p>
</header>
<form class="space-y-6">
<!-- Identity Inputs -->
<div class="space-y-4">
<div class="relative">
<label class="block text-on-surface-variant font-label-md mb-2" for="username">Username or Email</label>
<div class="group relative">
<span class="absolute left-4 top-1/2 -translate-y-1/2 material-symbols-outlined text-outline group-focus-within:text-secondary transition-colors" data-icon="mail">mail</span>
<input class="w-full pl-12 pr-4 py-3 bg-surface-container-low border-b-2 border-outline-variant focus:border-secondary focus:ring-0 rounded-t-xl transition-all font-body-md text-on-surface" id="username" name="username" placeholder="yourname@example.com" type="text"/>
</div>
</div>
<div class="relative">
<label class="block text-on-surface-variant font-label-md mb-2" for="password">Password</label>
<div class="group relative">
<span class="absolute left-4 top-1/2 -translate-y-1/2 material-symbols-outlined text-outline group-focus-within:text-secondary transition-colors" data-icon="lock">lock</span>
<input class="w-full pl-12 pr-12 py-3 bg-surface-container-low border-b-2 border-outline-variant focus:border-secondary focus:ring-0 rounded-t-xl transition-all font-body-md text-on-surface" id="password" name="password" placeholder="••••••••" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-outline hover:text-on-surface-variant transition-colors" type="button">
<span class="material-symbols-outlined" data-icon="visibility">visibility</span>
</button>
</div>
</div>
</div>
<div class="flex items-center justify-between">
<label class="flex items-center gap-2 cursor-pointer">
<input class="rounded border-outline-variant text-secondary focus:ring-secondary/20" type="checkbox"/>
<span class="text-on-surface-variant font-body-md">Remember me</span>
</label>
<a class="text-secondary font-label-md hover:underline" href="#">Forgot Password?</a>
</div>
<!-- Actions -->
<div class="space-y-4 pt-2">
<button class="w-full bg-[#FF6B35] text-white py-4 rounded-xl font-headline-sm shadow-md hover:shadow-lg active:scale-95 transition-all flex items-center justify-center gap-2" type="submit">
                            Login
                            <span class="material-symbols-outlined" data-icon="arrow_forward">arrow_forward</span>
</button>
<div class="relative flex items-center py-2">
<div class="flex-grow border-t border-outline-variant"></div>
<span class="flex-shrink mx-4 text-outline font-label-md">OR</span>
<div class="flex-grow border-t border-outline-variant"></div>
</div>
<button class="w-full bg-surface-container-highest border border-outline-variant text-on-surface py-3 rounded-xl font-body-lg hover:bg-surface-container-high transition-colors flex items-center justify-center gap-3" type="button">
<img alt="Google" class="w-5 h-5" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDEEOMluGvY433__nFMdoKK6l_uJnXIgUM_wXE_d9IcmMoz2zJYZr4_PceCXM-IHnvtf-cNbdgz_VAppmTmpHMyt9I5del2t-74f0U7YyvGg_hu_SJh7cPyPr5MoENUCnyRaKj1JUGumUhDDFVbuZnKz9BDMXdMGXFUqg71RWxnBZGEhf3g8ZF3vXsNRKdNdwKul9DVUgu512zDjj40hlwluIDhSZKs5mnPbk29QY3-kISbdVQpe7E6L8XDRiWSINOwNw4xkLBBuQ"/>
                            Sign in with Google
                        </button>
</div>
</form>
<footer class="text-center pt-8">
<p class="text-on-surface-variant font-body-md">
                        Don't have an account? 
                        <a class="text-secondary font-bold hover:underline ml-1" href="#">Create Account</a>
</p>
</footer>
</div>
</section>
</main>
<!-- FAB (Suppressed for Transactional screen per logic) -->
</body></html>
